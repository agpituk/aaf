<!DOCTYPE html>
<html lang="en" data-agent-version="0.1">
<head><meta charset="UTF-8" /><title>New Project — ProjectHub Redesigned</title></head>
<body>
  <header class="top-bar">
    <div class="logo">PH</div>
    <div class="nav-pills">
      <a href="/projects/" data-agent-kind="link" class="pill">Projects</a>
      <a href="/projects/new" data-agent-kind="link" class="pill active">New</a>
      <a href="/invites/" data-agent-kind="link" class="pill">Team</a>
    </div>
  </header>
  <div class="layout-grid">
    <section class="main-panel">
      <h2>Start a Project</h2>
      <form
        class="creation-form elevated-card"
        data-agent-kind="action"
        data-agent-action="project.create"
        data-agent-scope="projects.write"
        data-agent-danger="low"
        data-agent-confirm="optional"
        data-agent-idempotent="false"
      >
        <div class="input-stack">
          <span class="micro-label">Name</span>
          <input type="text" class="modern-input" data-agent-kind="field" data-agent-field="project_name" />
        </div>
        <div class="input-stack">
          <span class="micro-label">About</span>
          <textarea class="modern-input tall" data-agent-kind="field" data-agent-field="description"></textarea>
        </div>
        <div class="input-stack">
          <span class="micro-label">Access</span>
          <select class="modern-select" data-agent-kind="field" data-agent-field="visibility">
            <option value="private">Private</option>
            <option value="public">Public</option>
          </select>
        </div>
        <button type="submit" class="rounded-cta blue" data-agent-kind="action" data-agent-action="project.create.submit">Create</button>
        <output class="inline-notification" data-agent-kind="status" data-agent-output="project.create.status"></output>
      </form>
    </section>
  </div>
</body>
</html>
