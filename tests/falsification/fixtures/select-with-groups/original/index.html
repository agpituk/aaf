<!DOCTYPE html>
<html lang="en" data-agent-version="0.1">
<head><meta charset="UTF-8" /><title>Select with Groups — Original</title></head>
<body>
  <div id="transfer-page">
    <form
      id="transfer-form"
      class="transfer-form"
      data-agent-kind="action"
      data-agent-action="transfer.initiate"
      data-agent-scope="transfers.write"
      data-agent-danger="low"
      data-agent-confirm="review"
      data-agent-idempotent="false"
    >
      <div class="form-group">
        <label for="recipient">Recipient</label>
        <input type="text" id="recipient" class="form-control" data-agent-kind="field" data-agent-field="recipient" />
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" class="form-control select-grouped" data-agent-kind="field" data-agent-field="category">
          <optgroup label="Personal">
            <option value="rent">Rent</option>
            <option value="utilities">Utilities</option>
          </optgroup>
          <optgroup label="Business">
            <option value="payroll">Payroll</option>
            <option value="vendor">Vendor Payment</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" class="form-control" data-agent-kind="field" data-agent-field="amount" />
      </div>
      <button type="submit" id="transfer-btn" class="btn btn-warning" data-agent-kind="action" data-agent-action="transfer.initiate.submit">Send Transfer</button>
      <div id="transfer-status" class="alert" data-agent-kind="status" data-agent-output="transfer.initiate.status"></div>
    </form>
  </div>
</body>
</html>
